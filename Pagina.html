<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SportClub – Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

  <div class="card">

    <div class="logo-wrap">
      <img src="images/logo_empresa_letra_v1.png" alt="SportClub" />
    </div>

    <h1>Bienvenido a SportClub</h1>

    
    <div class="form-group">
      <label for="email">Email:</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Ingresa tu correo"
        autocomplete="email"
      />
    </div>

    <div class="form-group">
      <label for="password">Contraseña:</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Ingresa tu contraseña"
        autocomplete="current-password"
      />
    </div>

    <button class="btn-submit" type="button">Ingresar</button>
    <p id="errorMsg" style="color:red; text-align:center; margin-top:10px;"></p>

    <div class="divider"><span>o</span></div>

    <div class="card-footer">
      <a href="Recover_password.html">¿Olvidaste tu contraseña?</a>
      <span class="sep"></span>
      <a href="Register.html">Registrarse</a>
      <a href="dashboard_user.html">Usuario</a>
      <a href="dashboard_coach.html">Coach</a>
      <a href="dashboard_admin.html">Administrador</a>
    </div>

  </div>
  <script>
    document.querySelector(".btn-submit").addEventListener("click", function(){
    
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("errorMsg");
    
      errorMsg.textContent = "";
    
      const users = [
        { user: "Gabriel.Lopez@sportclub.cl", password: "1234", role: "user" },
        { user: "Andres.Maturana@sportclub.cl", password: "1234", role: "coach" },
        { user: "Luis.Gallardo@sportclub.cl", password: "1234", role: "admin" }
      ];
    
      const foundUser = users.find(u => u.user === email && u.password === password);
    
      if(foundUser){
        if(foundUser.role === "user"){
          window.location.href = "dashboard_user.html";
        }
        else if(foundUser.role === "coach"){
          window.location.href = "dashboard_coach.html";
        }
        else if(foundUser.role === "admin"){
          window.location.href = "dashboard_admin.html";
        }
      } else {
        errorMsg.textContent = "Credenciales incorrectas";
      }
    
    });
    </script>
</body>
</html>
